name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release image
        run: docker build -t chatterbox-docker:release .

      - name: Run smoke probe
        env:
          CHATTERBOX_SMOKE_IMAGE: chatterbox-docker:release
        run: bash scripts/smoke.sh

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release image
        if: github.event_name == 'push'
        run: |
          image="ghcr.io/${{ github.repository }}"
          docker tag chatterbox-docker:release "$image:${{ github.sha }}"
          docker tag chatterbox-docker:release "$image:latest"
          docker push "$image:${{ github.sha }}"
          docker push "$image:latest"
